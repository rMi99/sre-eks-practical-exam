---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: exam-user
  namespace: devops-exam
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: devops-exam
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods-binding
  namespace: devops-exam
subjects:
- kind: ServiceAccount
  name: exam-user
  namespace: devops-exam
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
